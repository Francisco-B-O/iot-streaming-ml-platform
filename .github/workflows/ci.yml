name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

# Cancel in-progress runs for the same branch/PR to save runner minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1 — Java: build + test + JaCoCo coverage
  # ─────────────────────────────────────────────────────────────
  java-test:
    name: Java — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for SonarCloud blame

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven        # caches ~/.m2 between runs

      - name: Build & run tests (JaCoCo enabled)
        run: |
          cd spring-event-iot-platform
          mvn verify -T 2 --batch-mode

      - name: Upload JaCoCo XML reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-reports
          path: spring-event-iot-platform/**/target/site/jacoco/jacoco.xml
          retention-days: 7

      - name: Upload Surefire test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: spring-event-iot-platform/**/target/surefire-reports/*.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2 — Python: lint (ruff) + tests (pytest + coverage)
  # ─────────────────────────────────────────────────────────────
  python-ci:
    name: Python — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          cd iot-ml-platform
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint — ruff
        run: |
          ruff check iot-ml-platform \
            --select=E,F,W,UP,B,C4,RUF \
            --ignore=E501 \
            --output-format=github

      - name: Test — pytest with coverage
        run: |
          cd iot-ml-platform
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-omit="**/tests/**,**/__init__.py"

      - name: Upload Python coverage XML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: iot-ml-platform/coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3 — SonarCloud analysis (runs after tests, uses coverage)
  # Requires secret: SONAR_TOKEN (see README for setup steps)
  # ─────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [java-test, python-ci]
    # Run even if tests failed so Sonar still reports issues
    if: ${{ !cancelled() && (needs.java-test.result == 'success' || needs.java-test.result == 'failure') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          cd iot-ml-platform
          pip install -r requirements.txt pytest pytest-cov

      - name: Generate Python coverage for Sonar
        run: |
          cd iot-ml-platform
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/ --cov=. --cov-report=xml:coverage.xml \
            --cov-omit="**/tests/**,**/__init__.py" || true

      - name: Build Java & generate JaCoCo reports
        run: |
          cd spring-event-iot-platform
          mvn verify -T 2 --batch-mode -q

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd spring-event-iot-platform
          mvn sonar:sonar \
            --batch-mode \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
