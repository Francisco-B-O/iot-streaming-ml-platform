# SonarCloud
sonar.organization=francisco-b-o
sonar.projectKey=Francisco-B-O_iot-streaming-ml-platform
sonar.host.url=https://sonarcloud.io

sonar.projectName=IoT Telemetry Platform
sonar.projectVersion=1.0.0

# Java sources (multi-module Maven — Sonar picks up modules automatically via mvn sonar:sonar)
sonar.java.source=21
sonar.java.binaries=spring-event-iot-platform/**/target/classes
sonar.java.test.binaries=spring-event-iot-platform/**/target/test-classes

# JaCoCo coverage for Java
sonar.coverage.jacoco.xmlReportPaths=spring-event-iot-platform/**/target/site/jacoco/jacoco.xml

# Python sources
sonar.python.version=3.11
sonar.python.coverage.reportPaths=iot-ml-platform/coverage.xml

# Test reports
sonar.junit.reportPaths=spring-event-iot-platform/**/target/surefire-reports

# Exclusions — don't waste analysis budget on generated/infra code
sonar.exclusions=\
  **/target/**,\
  **/*.min.js,\
  **/node_modules/**,\
  **/dist/**,\
  **/data/**,\
  **/__pycache__/**,\
  spring-event-iot-platform/**/target/generated-sources/**

sonar.coverage.exclusions=\
  **/*Application.java,\
  **/*Application.class,\
  **/*Dto.java,\
  **/*Request.java,\
  **/*Response.java,\
  **/*Event.java,\
  **/config/**,\
  **/simulator/**,\
  **/mapper/**,\
  **/migrations/**

sonar.sourceEncoding=UTF-8
