# SonarCloud
sonar.organization=francisco-b-o
sonar.projectKey=Francisco-B-O_iot-streaming-ml-platform
sonar.host.url=https://sonarcloud.io

sonar.projectName=IoT Telemetry Platform
sonar.projectVersion=1.0.0

# ── Java ──────────────────────────────────────────────────────────────────────
sonar.java.source=21
sonar.java.binaries=spring-event-iot-platform/**/target/classes
sonar.java.test.binaries=spring-event-iot-platform/**/target/test-classes

# JaCoCo coverage for Java
sonar.coverage.jacoco.xmlReportPaths=spring-event-iot-platform/**/target/site/jacoco/jacoco.xml

# ── Python ────────────────────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.python.coverage.reportPaths=iot-ml-platform/coverage.xml,spark-streaming-service/coverage-spark.xml

# ── TypeScript / Angular ──────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=frontend/tsconfig.json
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info

# ── Test reports ──────────────────────────────────────────────────────────────
sonar.junit.reportPaths=spring-event-iot-platform/**/target/surefire-reports

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/target/**,\
  **/*.min.js,\
  **/node_modules/**,\
  **/dist/**,\
  **/.angular/**,\
  **/data/**,\
  **/__pycache__/**,\
  spring-event-iot-platform/**/target/generated-sources/**,\
  **/spark-checkpoint/**

sonar.coverage.exclusions=\
  **/*Application.java,\
  **/*Application.class,\
  **/*Dto.java,\
  **/*Request.java,\
  **/*Response.java,\
  **/*Event.java,\
  **/*Test.java,\
  **/*IT.java,\
  **/*RedisKeys.java,\
  **/config/**,\
  **/simulator/**,\
  **/mapper/**,\
  **/migrations/**,\
  **/*.spec.ts,\
  **/*.spec.js,\
  **/karma.conf.js,\
  **/jest.config.*,\
  **/main.ts,\
  **/test.ts,\
  **/polyfills.ts,\
  **/environment*.ts,\
  **/*.module.ts,\
  **/test_*.py,\
  **/*_test.py,\
  **/conftest.py,\
  **/pytest.ini,\
  **/*.config.ts,\
  **/*.config.js,\
  **/kafka_consumer.py,\
  **/main.py,\
  **/train_model.py,\
  **/api/app.py,\
  **/schemas.py

sonar.sourceEncoding=UTF-8
