services:
  # ---------------------------------------------------------------------------
  # INFRASTRUCTURE
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - iot-network
    healthcheck:
      test: echo srvr | nc zookeeper 2181 || exit 1
      start_period: 10s
      retries: 20
      interval: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    expose:
      - "29092"
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - iot-network
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      start_period: 20s
      retries: 20
      interval: 10s

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=iot_platform
    volumes:
      - ./infrastructure/docker/postgres-data:/var/lib/postgresql/data
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    expose:
      - "6379"
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - iot-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./spring-event-iot-platform/infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - iot-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # MICROSERVICES (Spring Boot)
  # ---------------------------------------------------------------------------
  discovery-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/discovery-service/Dockerfile
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
    networks:
      - iot-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      retries: 10
      timeout: 5s

  auth-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    expose:
      - "8088"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - JWT_SECRET=eW91ci0yNTYtYml0LXNlY3JldC1rZXktdGVzdGluZy0=
      - JWT_EXPIRATION=3600000
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/iot_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  gateway-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - JWT_SECRET=eW91ci0yNTYtYml0LXNlY3JldC1rZXktdGVzdGluZy0=
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=true
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  device-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/device-service/Dockerfile
    container_name: device-service
    expose:
      - "8081"
    depends_on:
      discovery-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/iot_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  ingestion-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/ingestion-service/Dockerfile
    container_name: ingestion-service
    expose:
      - "8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  processing-service:
    build:
      context: .
      dockerfile: Dockerfile.processing
    container_name: processing-service
    expose:
      - "8083"
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/iot_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  alert-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/alert-service/Dockerfile
    container_name: alert-service
    expose:
      - "8084"
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/iot_platform
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  analytics-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/analytics-service/Dockerfile
    container_name: analytics-service
    expose:
      - "8085"
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  notification-service:
    build:
      context: ./spring-event-iot-platform
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    expose:
      - "8086"
    depends_on:
      discovery-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # SIMULATOR
  # ---------------------------------------------------------------------------
  device-simulator:
    build:
      context: ./spring-event-iot-platform
      dockerfile: simulator/device-simulator/Dockerfile
    container_name: device-simulator
    depends_on:
      gateway-service:
        condition: service_started
    environment:
      - SIMULATOR_GATEWAY_URL=http://gateway-service:8080
      - SIMULATOR_AUTH_USERNAME=admin
      - SIMULATOR_AUTH_PASSWORD=admin123
      - SIMULATOR_INTERVAL=5000
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # BIG DATA LAYER — Spark Structured Streaming
  # ---------------------------------------------------------------------------
  spark-streaming-service:
    build: ./spark-streaming-service
    container_name: spark-streaming-service
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - INPUT_TOPIC=device-data-processed
      - OUTPUT_TOPIC=device-data-enriched
      - WINDOW_SIZE=20
      - CHECKPOINT_LOCATION=/tmp/spark-checkpoint
      - SPARK_MASTER=local[2]
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # PYTHON ML PLATFORM
  # ---------------------------------------------------------------------------
  iot-ml-platform:
    build: ./iot-ml-platform
    container_name: iot-ml-platform
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_GROUP_ID=ml-group
      - KAFKA_CONSUME_TOPICS=["device-data-enriched"]
      - DATA_LAKE_PATH=/app/data/raw
      - PROCESSED_DATA_PATH=/app/data/processed
      - MODEL_STORAGE_PATH=/app/ml/models
      - ANOMALY_THRESHOLD=-0.05
    volumes:
      - ./iot-ml-platform/data:/app/data
      - ./iot-ml-platform/ml/models:/app/ml/models
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      spark-streaming-service:
        condition: service_started
    networks:
      - iot-network

  # ---------------------------------------------------------------------------
  # FRONTEND (Angular)
  # ---------------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:80"
    depends_on:
      - gateway-service
      - iot-ml-platform
    environment:
      - API_GATEWAY_URL=http://gateway-service:8080
      - ML_API_URL=http://iot-ml-platform:8000
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge
