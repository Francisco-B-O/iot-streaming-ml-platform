server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    wait-time-in-ms-when-sync-empty: 0
    response-cache-update-interval-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: "*"
      cors:
        allowed-origin-patterns: "*"
        allowed-methods: "*"
        allowed-headers: "*"
        max-age: 3600
  endpoint:
    health:
      show-details: always
